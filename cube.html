<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Responsive Cube</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1600") center center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,Helvetica,sans-serif;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
}

.scene{
    width:min(55vw,300px);
    height:min(55vw,300px);
    perspective:1200px;
    z-index:2;
}

.cube{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:rotateCube 25s linear infinite;
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    border:2px solid rgba(255,255,255,.5);
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(6px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    font-weight:bold;
    color:#fff;
    box-shadow:0 0 25px rgba(0,255,255,.4);
}

.front{
    transform:translateZ(150px);
}
.back{
    transform:rotateY(180deg) translateZ(150px);
}
.right{
    transform:rotateY(90deg) translateZ(150px);
}
.left{
    transform:rotateY(-90deg) translateZ(150px);
}
.top{
    transform:rotateX(90deg) translateZ(150px);
}
.bottom{
    transform:rotateX(-90deg) translateZ(150px);
}

@keyframes rotateCube{

0%{
transform:rotateX(-20deg) rotateY(0deg);
}

100%{
transform:rotateX(-20deg) rotateY(360deg);
}

}

.title{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:#fff;
    z-index:5;
}

@media(max-width:768px){

.scene{
width:220px;
height:220px;
}

.front{transform:translateZ(110px);}
.back{transform:rotateY(180deg) translateZ(110px);}
.right{transform:rotateY(90deg) translateZ(110px);}
.left{transform:rotateY(-90deg) translateZ(110px);}
.top{transform:rotateX(90deg) translateZ(110px);}
.bottom{transform:rotateX(-90deg) translateZ(110px);}

.face{
font-size:26px;
}

}

</style>

</head>
<body>

<div class="overlay"></div>

<div class="title">
<h2>Responsive 3D Cube</h2>
<p>Drag with Mouse or Finger</p>
</div>

<div class="scene">

<div class="cube" id="cube">

<div class="face front bg-primary">Front</div>

<div class="face back bg-danger">Back</div>

<div class="face left bg-success">Left</div>

<div class="face right bg-warning text-dark">Right</div>

<div class="face top bg-info">Top</div>

<div class="face bottom bg-dark">Bottom</div>

</div>

</div>


<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let cube=$("#cube");

let rotateX=-20;
let rotateY=0;

let dragging=false;

let startX=0;
let startY=0;

// Stop animation when dragging

cube.on("mousedown touchstart",function(e){

dragging=true;

cube.css("animation","none");

let touch=e.originalEvent.touches?
e.originalEvent.touches[0]:e;

startX=touch.clientX;
startY=touch.clientY;

});

$(document).on("mousemove touchmove",function(e){

if(!dragging) return;

let touch=e.originalEvent.touches?
e.originalEvent.touches[0]:e;

let dx=touch.clientX-startX;
let dy=touch.clientY-startY;

rotateY+=dx*0.5;
rotateX-=dy*0.5;

cube.css("transform",
`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`);

startX=touch.clientX;
startY=touch.clientY;

});

$(document).on("mouseup touchend",function(){

if(!dragging) return;

dragging=false;

cube.css("animation","rotateCube 25s linear infinite");

});

// AJAX Example

$.ajax({

url:"https://jsonplaceholder.typicode.com/posts/1",

method:"GET",

success:function(res){

console.log("AJAX Response");

console.log(res);

}

});

</script>

</body>
</html>
